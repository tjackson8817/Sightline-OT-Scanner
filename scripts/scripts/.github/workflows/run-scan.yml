name: Run OT OSINT Scan

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: "Company name (used for the report filename and display)"
        required: true
        type: string
      domain:
        description: "Primary domain, no https:// (e.g. example.com)"
        required: true
        type: string
      industry:
        description: "Industry (optional, shown on the report)"
        required: false
        type: string
        default: "Not specified"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scan
        env:
          COMPANY_NAME: ${{ inputs.company_name }}
          DOMAIN: ${{ inputs.domain }}
          INDUSTRY: ${{ inputs.industry }}
        run: python scripts/osint_scan.py

      - name: Commit report
        run: |
          git config user.name "ot-osint-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/reports/*.json
          git diff --quiet --cached || git commit -m "Add scan report: ${{ inputs.company_name }}"
          git push
